services:
  - type: web
    name: receiptpro-api
    env: python
    plan: starter
    runtime: python3.11
    buildCommand: cd ReceiptPro && pip install -r requirements.txt
    startCommand: cd ReceiptPro && uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: EVERSEND_BASE_URL
        value: https://api.eversend.co/v1
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: EVERSEND_BUSINESS_ID
        sync: false
      - key: EVERSEND_CALLBACK_URL
        sync: false
